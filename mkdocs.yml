site_name: Software Development Wiki
site_description: Wiki di software development per programmatori intermedio/avanzato
site_author: HxT9
site_url: https://hxt9.github.io/Software-Dev-Wiki/

repo_url: https://github.com/HxT9/Software-Dev-Wiki
repo_name: HxT9/Software-Dev-Wiki
edit_uri: edit/main/dev-wiki/

docs_dir: dev-wiki
site_dir: site

theme:
  name: material
  language: it
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Passa al tema scuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Passa al tema chiaro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang:
        - en
        - it
  - awesome-pages
  - section-index
  - tags:
      tags_file: 00_Index/Tag_Index.md
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%

markdown_extensions:
  # Standard Markdown extensions — safe and broadly useful.
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: In questa pagina
  # pymdownx — minimal selection.
  # Intentionally NOT enabled (each broke or risked breaking C#/code samples):
  #   - pymdownx.smartsymbols   ("=>" → "⇒" tripped the Pygments csharp lexer)
  #   - pymdownx.arithmatex     ("$..." in C# interpolated strings look like math)
  #   - pymdownx.snippets       ("---" / "<-" patterns risk false-positive directives)
  #   - pymdownx.tabbed, .keys, .caret, .mark, .tilde   (unused features → unnecessary risk)
  - pymdownx.betterem
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HxT9
  generator: false

extra_css:
  - assets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

copyright: >
  Software Development Wiki — costruita con
  <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank">Material for MkDocs</a>
